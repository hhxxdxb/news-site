<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻中心</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .news-item { background: white; margin: 20px 0; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-title { font-size: 24px; margin-bottom: 10px; color: #333; }
        .news-meta { color: #777; font-size: 14px; margin-bottom: 15px; }
        .news-content { line-height: 1.6; }
    </style>
</head>
<body>
    <h1>新闻中心</h1>
    <div id="news-list"></div>

    <script>
        // 加载 news.json 并显示新闻
        fetch('news.json')
            .then(response => response.json())
            .then(newsArray => {
                const container = document.getElementById('news-list');
                container.innerHTML = '';
                newsArray.forEach(news => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-meta">作者：${escapeHtml(news.author)} | 日期：${escapeHtml(news.date)}</div>
                        <div class="news-content">${escapeHtml(news.content)}</div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => console.error('加载新闻失败:', error));

        // 简单的防XSS函数
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
    </script>
</body>
</html>
